
<!DOCTYPE html>

<body>
<div class="container">
    <div class="header">
        <h1>GeeksforGeeks Scraper</h1>
        <p>academic research · dynamic extraction pipeline</p>
    </div>

    <div class="main-content">
        <div class="control-panel">
            <div class="url-section">
                <input type="url" id="urlInput" value="https://www.geeksforgeeks.org/search/?gq=devops" placeholder="enter search results url (e.g., ?search=web+development)" readonly>
                <button class="btn btn-primary" id="scrapeBtn">run scraper</button>
            </div>

            <div id="status" class="status-bar" style="display: none;"></div>
            <div id="progressSection" style="display: none;">
                <div class="progress-container">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>extraction progress</span>
                        <span><span id="completedCount">0</span>/<span id="totalCount">10</span></span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%;"></div></div>

            </div>

            <div id="statsSection" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card"><h3 id="statTotal">0</h3><p>articles</p></div>
                    <div class="stat-card"><h3 id="statWithCode">0</h3><p>with code</p></div>
                    <div class="stat-card"><h3 id="statWithComplexity">0</h3><p>complexity</p></div>
                    <div class="stat-card"><h3 id="statWithRefs">0</h3><p>references</p></div>
                </div>
            </div>

            <div id="filterSection" style="display: none;">
                <div class="filter-section">
                    <input type="text" id="searchFilter" placeholder="filter by title or concept">
                    <select id="difficultyFilter"><option value="">all difficulties</option><option value="Easy">easy</option><option value="Medium">medium</option><option value="Hard">hard</option></select>
                </div>
            </div>

            <div id="viewTabs" class="tab-container" style="display: none;">
                <button class="tab active" id="cardViewTab">card view</button>
                <button class="tab" id="previewTab">data preview (json)</button>
            </div>

            <div id="contentSection"></div>
            <div id="actionSection" style="display: none;">
                <div class="action-buttons">
                    <button class="btn btn-secondary" id="saveJsonBtn">save to local</button>
                    <button class="btn btn-info" id="loadJsonBtn">load saved data</button>
                    <button class="btn btn-success" id="generatePdfBtn">generate pdf report</button>
                    <button class="btn btn-warning" id="exportJsonBtn">export json file</button>
                </div>
            </div>
        </div>

        <div id="emptyState" class="empty-state">
            <h2>ready for extraction</h2>
            <p>enter a geeksforgeeks search url above and run the scraper</p>
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // ==================== JAVASCRIPT WITH ENHANCED OFFLINE CAPABILITIES ====================
        (function() {
            const CONFIG = {
                targetUrl: 'https://www.geeksforgeeks.org/search/?gq=devops',
                apiUrl: 'https://www.geeksforgeeks.org/search/?gq=devops',
                minTopics: 10,
                requestDelay: 1000,
                storageKey: 'gfg_webdev_search_data',
                studentName: 'Miguel Carlos S. Ponday',
                proxyList: [
                    { name: 'corsproxy.io', url: (t) => `https://corsproxy.io/?${encodeURIComponent(t)}` },
                    { name: 'api.allorigins.win', url: (t) => `https://api.allorigins.win/get?url=${encodeURIComponent(t)}`, extract: async (r) => (await r.json()).contents }
                ]
            };

            let scrapedTopics = [];
            let filteredTopics = [];
            let isScraping = false;
            let activeTab = 'card';

            // Helper: Check online status
            function isOnline() {
                return navigator.onLine;
            }

            // DO NOT auto-load saved data on startup - keep empty state visible
            // We'll only load when user clicks "load" button

            const elements = {
                urlInput: document.getElementById('urlInput'),
                scrapeBtn: document.getElementById('scrapeBtn'),
                status: document.getElementById('status'),
                progressSection: document.getElementById('progressSection'),
                statsSection: document.getElementById('statsSection'),
                filterSection: document.getElementById('filterSection'),
                viewTabs: document.getElementById('viewTabs'),
                contentSection: document.getElementById('contentSection'),
                actionSection: document.getElementById('actionSection'),
                emptyState: document.getElementById('emptyState'),
                completedCount: document.getElementById('completedCount'),
                totalCount: document.getElementById('totalCount'),
                progressFill: document.getElementById('progressFill'),
                currentTopic: document.getElementById('currentTopic'),
                statTotal: document.getElementById('statTotal'),
                statWithCode: document.getElementById('statWithCode'),
                statWithComplexity: document.getElementById('statWithComplexity'),
                statWithRefs: document.getElementById('statWithRefs'),
                searchFilter: document.getElementById('searchFilter'),
                difficultyFilter: document.getElementById('difficultyFilter'),
                cardViewTab: document.getElementById('cardViewTab'),
                previewTab: document.getElementById('previewTab'),
                saveJsonBtn: document.getElementById('saveJsonBtn'),
                loadJsonBtn: document.getElementById('loadJsonBtn'),
                generatePdfBtn: document.getElementById('generatePdfBtn'),
                exportJsonBtn: document.getElementById('exportJsonBtn')
            };

            function setStatus(type, message, duration = 5000) {
                elements.status.style.display = 'flex';
                elements.status.className = `status-bar ${type}`;
                elements.status.innerHTML = type === 'loading' ? 
                    `<div class="spinner"></div> ${message}` : message;
                if (type !== 'loading') setTimeout(() => elements.status.style.display = 'none', duration);
            }

            function escapeHtml(text) {
                if (!text) return '';
                return String(text).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
            }

            async function fetchWithProxy(url) {
                for (const proxy of CONFIG.proxyList) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 15000);
                        const response = await fetch(proxy.url(url), { signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (!response.ok) continue;
                        if (proxy.extract) return await proxy.extract(response);
                        return await response.text();
                    } catch (e) {}
                }
                throw new Error('All proxies failed');
            }

            async function fetchFromGfGApi() {
                try {
                    const apiUrl = 'https://www.geeksforgeeks.org/search/?gq=devops';
                    const response = await fetchWithProxy(apiUrl);
                    if (response) {
                        const posts = JSON.parse(response);
                        return posts.map(post => ({
                            url: post.link,
                            title: post.title.rendered.replace(/<[^>]*>/g, '').trim(),
                            date: post.date
                        }));
                    }
                } catch (e) {}
                return [];
            }

            async function extractArticleLinks(html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const articles = [];
                const seenUrls = new Set();
                
                const searchResultSelectors = [
                    'article a', '.search-result a', '.result a', '.gs-title a',
                    'h3 a', 'h4 a', '.head a', 'a[href*=".php"]'
                ];
                
                searchResultSelectors.forEach(selector => {
                    doc.querySelectorAll(selector).forEach(link => {
                        const href = link.href || link.getAttribute('href');
                        const title = link.textContent?.trim() || '';
                        
                        if (!href || !title || title.length < 10) return;
                        if (!href.includes('geeksforgeeks.org') && !href.startsWith('/')) return;
                        
                        const excludeTerms = ['login', 'signup', 'register', 'forum', 'course', 'practice', 
                            'problem', 'contest', 'job', 'interview', 'tag', 'category', 'author', 
                            'page', 'comment', 'search', 'about', 'privacy', 'policy', 'terms', 
                            'contact', 'careers'];
                        
                        let shouldExclude = false;
                        for (const term of excludeTerms) {
                            if (href.toLowerCase().includes(term) || title.toLowerCase().includes(term)) {
                                shouldExclude = true;
                                break;
                            }
                        }
                        
                        if (shouldExclude) return;
                        
                        if (href.includes('.php') || (href.match(/\//g)?.length >= 3)) {
                            const fullUrl = href.startsWith('http') ? href : 
                                `https://www.geeksforgeeks.org${href.startsWith('/') ? href : '/' + href}`;
                            
                            if (!seenUrls.has(fullUrl)) {
                                seenUrls.add(fullUrl);
                                articles.push({ url: fullUrl, title });
                            }
                        }
                    });
                });
                
                return articles.slice(0, CONFIG.minTopics);
            }

            async function getWebDevArticles() {
                setStatus('loading', 'fetching articles from search results...');
                
                try {
                    const apiArticles = await fetchFromGfGApi();
                    if (apiArticles.length >= CONFIG.minTopics) {
                        return apiArticles.slice(0, CONFIG.minTopics);
                    }
                    
                    const searchHtml = await fetchWithProxy(CONFIG.targetUrl);
                    const htmlArticles = await extractArticleLinks(searchHtml);
                    
                    if (htmlArticles.length > 0) {
                        return htmlArticles.slice(0, CONFIG.minTopics);
                    }
                    
                    throw new Error('No articles found');
                } catch (error) {
                    throw new Error('Unable to fetch articles');
                }
            }

            function extractDifficulty(html, title) {
                const lowerHtml = html.toLowerCase();
                const lowerTitle = title.toLowerCase();
                
                if (lowerHtml.includes('difficulty: easy') || lowerHtml.includes('beginner')) return 'Easy';
                if (lowerHtml.includes('difficulty: medium') || lowerHtml.includes('intermediate')) return 'Medium';
                if (lowerHtml.includes('difficulty: hard') || lowerHtml.includes('advanced')) return 'Hard';
                if (lowerTitle.includes('beginner') || lowerTitle.includes('basics')) return 'Easy';
                if (lowerTitle.includes('advanced')) return 'Hard';
                return 'Medium';
            }

            function extractConcepts(html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const concepts = [];
                
                const selectors = ['h2', 'h3', 'strong', 'b', 'article p', '.entry-content p', '.text p', 'main p'];
                
                selectors.forEach(selector => {
                    doc.querySelectorAll(selector).forEach(el => {
                        const text = el.textContent.trim();
                        if (text.length > 60 && text.length < 400 && !text.includes('cookie') && !text.includes('privacy')) {
                            concepts.push(text);
                        }
                    });
                });
                
                if (concepts.length === 0) {
                    doc.querySelectorAll('p').forEach(p => {
                        const text = p.textContent.trim();
                        if (text.length > 100 && text.length < 500 && !text.includes('cookie') && !text.includes('privacy')) {
                            concepts.push(text);
                        }
                    });
                }
                
                return concepts.length > 0 ? concepts.slice(0, 2) : ['Key concepts available in the full article.'];
            }

            function extractCodeSnippets(html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const codes = [];
                
                const selectors = ['pre code', 'pre', 'code', '.code-block', '.highlight', '.syntaxhighlighter'];
                
                selectors.forEach(selector => {
                    doc.querySelectorAll(selector).forEach(el => {
                        const code = el.textContent.trim();
                        if (code.length > 30 && code.length < 3000 && 
                            (code.includes('{') || code.includes('function') || code.includes('var ') || 
                             code.includes('let ') || code.includes('const ') || code.includes('=>'))) {
                            codes.push(code);
                        }
                    });
                });
                
                return codes.slice(0, 2);
            }

            function extractComplexity(html) {
                let time = 'Not Available', space = 'Not Available';
                
                const timeMatch = html.match(/time complexity[:\s]*([^.\n]+)/i);
                if (timeMatch) time = timeMatch[1].trim().substring(0, 50);
                
                const spaceMatch = html.match(/space complexity[:\s]*([^.\n]+)/i);
                if (spaceMatch) space = spaceMatch[1].trim().substring(0, 50);
                
                return { timeComplexity: time, spaceComplexity: space };
            }

            function extractReferences(html, currentUrl) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const refs = [];
                const seen = new Set();
                
                const refSelectors = ['.references a', '.ref a', '.related a', 'aside a', '.sidebar a', '.also-read a'];
                
                refSelectors.forEach(selector => {
                    doc.querySelectorAll(selector).forEach(link => {
                        const href = link.href;
                        const text = link.textContent.trim();
                        
                        if (href && text && href !== currentUrl && !seen.has(href) && 
                            href.includes('geeksforgeeks.org') && !href.includes('login') && !href.includes('signup')) {
                            seen.add(href);
                            refs.push({ title: text.substring(0, 50), url: href });
                        }
                    });
                });
                
                return refs.slice(0, 3);
            }

            async function scrapeArticle(articleInfo, index, total) {
                elements.currentTopic.textContent = `>_ scraping ${index}/${total}: ${articleInfo.title.substring(0, 50)}`;
                
                try {
                    const html = await fetchWithProxy(articleInfo.url);
                    return {
                        id: `article-${Date.now()}-${index}`,
                        title: articleInfo.title,
                        url: articleInfo.url,
                        difficulty: extractDifficulty(html, articleInfo.title),
                        concepts: extractConcepts(html),
                        codeSnippets: extractCodeSnippets(html),
                        ...extractComplexity(html),
                        references: extractReferences(html, articleInfo.url),
                        dateGenerated: new Date().toISOString()
                    };
                } catch (error) {
                    return {
                        id: `article-${Date.now()}-${index}`,
                        title: articleInfo.title,
                        url: articleInfo.url,
                        difficulty: 'Not Available',
                        concepts: ['⚠️ Failed to load content'],
                        codeSnippets: [],
                        timeComplexity: 'Not Available',
                        spaceComplexity: 'Not Available',
                        references: [],
                        dateGenerated: new Date().toISOString(),
                        error: true
                    };
                }
            }

            async function startScraping() {
                if (!isOnline()) {
                    setStatus('error', '❌ Cannot scrape while offline. Please connect to internet.');
                    return;
                }
                
                if (isScraping) return;
                
                isScraping = true;
                elements.scrapeBtn.disabled = true;
                
                elements.emptyState.style.display = 'none';
                elements.progressSection.style.display = 'block';
                elements.statsSection.style.display = 'none';
                elements.filterSection.style.display = 'none';
                elements.viewTabs.style.display = 'none';
                elements.contentSection.innerHTML = '';
                elements.actionSection.style.display = 'none';
                
                try {
                    const articles = await getWebDevArticles();
                    
                    if (articles.length === 0) throw new Error('No articles found');
                    
                    const topicsToScrape = articles.slice(0, CONFIG.minTopics);
                    elements.totalCount.textContent = topicsToScrape.length;
                    setStatus('loading', `found ${articles.length} articles. scraping ${topicsToScrape.length}...`);
                    
                    const scraped = [];
                    for (let i = 0; i < topicsToScrape.length; i++) {
                        const article = await scrapeArticle(topicsToScrape[i], i + 1, topicsToScrape.length);
                        scraped.push(article);
                        
                        elements.completedCount.textContent = i + 1;
                        elements.progressFill.style.width = `${((i + 1) / topicsToScrape.length) * 100}%`;
                        
                        await new Promise(r => setTimeout(r, CONFIG.requestDelay));
                    }
                    
                    scrapedTopics = scraped;
                    filteredTopics = [...scrapedTopics];
                    
                    localStorage.setItem(CONFIG.storageKey, JSON.stringify(scrapedTopics));
                    
                    updateUIAfterScrape();
                    
                    setStatus('success', `✅ scraped ${scrapedTopics.length} articles!`);
                    
                } catch (error) {
                    setStatus('error', `❌ error: ${error.message}`);
                    elements.emptyState.style.display = 'block';
                } finally {
                    isScraping = false;
                    elements.scrapeBtn.disabled = false;
                    elements.progressSection.style.display = 'none';
                }
            }

            function updateUIAfterScrape() {
                elements.statTotal.textContent = scrapedTopics.length;
                elements.statWithCode.textContent = scrapedTopics.filter(t => t.codeSnippets.length > 0).length;
                elements.statWithComplexity.textContent = scrapedTopics.filter(t => !t.timeComplexity.includes('Not Available')).length;
                elements.statWithRefs.textContent = scrapedTopics.filter(t => t.references.length > 0).length;
                
                elements.statsSection.style.display = 'block';
                elements.filterSection.style.display = 'block';
                elements.viewTabs.style.display = 'flex';
                elements.actionSection.style.display = 'block';
                
                // Hide empty state
                elements.emptyState.style.display = 'none';
                
                renderCardView();
            }

                        `<div class="code-preview"><pre>${escapeHtml(topic.codeSnippets[0].substring(0, 300))}${topic.codeSnippets[0].length > 300 ? '\n// ...' : ''}</pre></div>` :

                    ).join('');

                            topic.references.map(r => `<a href="${escapeHtml(r.url)}" target="_blank" class="reference-link">🔗 ${escapeHtml(r.title)}</a>`).join('')

                            </div>

                            </div>

            function renderDataPreview() {
                const previewData = filteredTopics.map(t => ({
                    title: t.title,
                    difficulty: t.difficulty,
                    concepts: t.concepts.length,
                    codeSnippets: t.codeSnippets.length,
                    timeComplexity: t.timeComplexity,
                    spaceComplexity: t.spaceComplexity,
                    references: t.references.length
                }));
                
                elements.contentSection.innerHTML = `
                    <div class="data-preview">
                        <div class="json-viewer">${escapeHtml(JSON.stringify(previewData, null, 2))}</div>
                    </div>
                `;

            function filterTopics() {
                const search = elements.searchFilter.value.toLowerCase();
                const difficulty = elements.difficultyFilter.value;
                
                filteredTopics = scrapedTopics.filter(t => {
                    if (search && !`${t.title} ${t.concepts.join(' ')}`.toLowerCase().includes(search)) return false;
                    if (difficulty && t.difficulty !== difficulty) return false;
                    return true;
                });
                
                activeTab === 'card' ? renderCardView() : renderDataPreview();
            }

            function saveToLocalStorage() {
                if (scrapedTopics.length === 0) {
                    setStatus('warning', '⚠️ no data to save');
                    return;
                }
                localStorage.setItem(CONFIG.storageKey, JSON.stringify(scrapedTopics));
                setStatus('success', '✅ data saved');
            }

            function loadFromLocalStorage() {
                try {
                    const saved = localStorage.getItem(CONFIG.storageKey);
                    if (saved) {
                        scrapedTopics = JSON.parse(saved);
                        filteredTopics = [...scrapedTopics];
                        updateUIAfterScrape();
                        setStatus('success', `✅ loaded ${scrapedTopics.length} topics`);
                    } else {
                        setStatus('warning', '⚠️ no saved data');
                    }
                } catch (e) {
                    setStatus('error', '❌ failed to load');
                }
            }

            function exportToJsonFile() {
                if (scrapedTopics.length === 0) {
                    setStatus('warning', '⚠️ no data to export');
                    return;
                }
                const data = JSON.stringify(scrapedTopics, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `gfg_webdev_${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                setStatus('success', `✅ exported ${scrapedTopics.length} topics`);
            }

                        pdf.setFontSize(11);
                        pdf.text('TIME COMPLEXITY', 25, y+4);
                        pdf.text('SPACE COMPLEXITY', 110, y+4);
                        y += 12;
                        
                        pdf.setFont('times', 'normal');
                        pdf.setFontSize(10);
                        
                        // Handle potentially long complexity strings
                        const timeComplexity = topic.timeComplexity.length > 30 ? 
                            topic.timeComplexity.substring(0, 27) + '...' : 
                            topic.timeComplexity;
                        const spaceComplexity = topic.spaceComplexity.length > 30 ? 
                            topic.spaceComplexity.substring(0, 27) + '...' : 
                            topic.spaceComplexity;
                            
                        pdf.text(timeComplexity, 25, y);
                        pdf.text(spaceComplexity, 110, y);
                        y += 12;
                        
                        // Complexity Explanation with safe spacing
                        pdf.setFont('times', 'italic');
                        pdf.setFontSize(9);
                        pdf.setTextColor(80, 80, 80);
                        
                        // Create safe complexity note
                        let complexityNote = '';
                        if (!topic.timeComplexity.includes('Not Available') && !topic.spaceComplexity.includes('Not Available')) {
                            complexityNote = `Analysis: ${topic.timeComplexity} time complexity indicates how the algorithm scales with input size, while ${topic.spaceComplexity} space complexity shows memory requirements.`;
                        } else {
                            complexityNote = 'Analysis: Specific complexity metrics not available for this article.';
                        }
                        
                        const noteLines = pdf.splitTextToSize(complexityNote, 160);
                        pdf.text(noteLines, 25, y);
                        y += noteLines.length * 4 + 10;
                        
                        // 4. CODE IMPLEMENTATION
                        if (topic.codeSnippets && topic.codeSnippets.length > 0) {
                            if (y > 230) { 
                                pdf.addPage(); 
                                y = 25;
                                
                                // Continuation header
                                pdf.setFillColor(0, 51, 102);
                                pdf.rect(0, 0, 210, 8, 'F');
                                pdf.setFont('times', 'bold');
                                pdf.setFontSize(14);
                                pdf.setTextColor(0, 51, 102);
                                pdf.text(`ARTICLE ${index + 1} (continued)`, 20, 20);
                                y = 30;
                            }
                            
                            pdf.setFont('times', 'bold');
                            pdf.setFontSize(14);
                            pdf.setTextColor(0, 51, 102);
                            pdf.text('1.4 Implementation Example', 20, y);
                            y += 8;
                            
                            // Code block with proper spacing
                            pdf.setFillColor(250, 250, 250);
                            pdf.rect(20, y-2, 170, 55, 'F'); // Fixed height background
                            
                            pdf.setFont('courier', 'normal');
                            pdf.setFontSize(8);
                            pdf.setTextColor(40, 40, 40);
                            
                            const codeText = topic.codeSnippets[0];
                            const codeLines = pdf.splitTextToSize(codeText, 140);
                            
                            // Display code with line numbers (limit to 10 lines for spacing)
                            for (let j = 0; j < Math.min(codeLines.length, 10); j++) {
                                pdf.setTextColor(150, 150, 150);
                                pdf.text(`${j+1}.`, 22, y + (j*4.5));
                                pdf.setTextColor(40, 40, 40);
                                pdf.text(codeLines[j], 30, y + (j*4.5));
                            }
                            
                            y += Math.min(codeLines.length, 10) * 4.5 + 12;
                            
                            if (codeLines.length > 10) {
                                pdf.setFont('times', 'italic');
                                pdf.setFontSize(8);
                                pdf.setTextColor(100, 100, 100);
                                pdf.text('// Additional implementation lines truncated', 25, y);
                                y += 8;
                            }
                            
                            // Reset font
                            pdf.setFont('times', 'normal');
                        }
                        
                        // 5. KEY TAKEAWAYS
                        if (y > 250) { 
                            pdf.addPage(); 
                            y = 25;
                            
                            // Continuation header
                            pdf.setFillColor(0, 51, 102);
                            pdf.rect(0, 0, 210, 8, 'F');
                            pdf.setFont('times', 'bold');
                            pdf.setFontSize(14);
                            pdf.setTextColor(0, 51, 102);
                            pdf.text(`ARTICLE ${index + 1} (continued)`, 20, 20);
                            y = 30;
                        }
                        
                        pdf.setFont('times', 'bold');
                        pdf.setFontSize(14);
                        pdf.setTextColor(0, 51, 102);
                        pdf.text('1.5 Key Takeaways', 20, y);
                        y += 8;
                        
                        pdf.setFont('times', 'normal');
                        pdf.setFontSize(10);
                        
                        // Safe takeaways
                        const takeaway1 = topic.concepts[0] ? 
                            `• Main Concept: ${topic.concepts[0].substring(0, 70)}${topic.concepts[0].length > 70 ? '...' : ''}` :
                            '• Main Concept: Core principles covered in article';
                        
                        const takeaway2 = (!topic.timeComplexity.includes('Not Available') && !topic.spaceComplexity.includes('Not Available')) ?
                            `• Performance: ${topic.timeComplexity} time, ${topic.spaceComplexity} space` :
                            '• Performance: Refer to complexity analysis section';
                        
                        const takeaway3 = `• Practical Use: Essential for ${topic.difficulty.toLowerCase()}-level understanding`;
                        
                        const takeaways = [takeaway1, takeaway2, takeaway3];
                        
                        takeaways.forEach(take => {
                            if (y > 270) { 
                                pdf.addPage(); 
                                y = 25;
                                
                                // Continuation header
                                pdf.setFillColor(0, 51, 102);
                                pdf.rect(0, 0, 210, 8, 'F');
                                pdf.setFont('times', 'bold');
                                pdf.setFontSize(14);
                                pdf.setTextColor(0, 51, 102);
                                pdf.text(`ARTICLE ${index + 1} (continued)`, 20, 20);
                                y = 30;
                                
                                pdf.setFont('times', 'normal');
                                pdf.setFontSize(10);
                            }
                            
                            const takeLines = pdf.splitTextToSize(take, 160);
                            pdf.text(takeLines, 25, y);
                            y += takeLines.length * 4 + 3;
                        });
                        
                        // Page footer with source - always at bottom
                        pdf.setFont('times', 'italic');
                        pdf.setFontSize(7);
                        pdf.setTextColor(100, 100, 100);
                        
                        // Create safe source URL
                        let sourceUrl = topic.url || 'Source not available';
                        if (sourceUrl.length > 60) sourceUrl = sourceUrl.substring(0, 57) + '...';
                        
                        pdf.text(`Source: ${sourceUrl} | Article ${index + 1} of ${filteredTopics.length}`, 20, 285);
                        pdf.text(`Page ${pdf.internal.getNumberOfPages()}`, 190, 285, { align: 'right' });
                    });
                    
                    // ========== COMPLEXITY REFERENCE CHARTS ==========
                    pdf.addPage();
                    pdf.setFont('times', 'bold');
                    pdf.setFontSize(20);
                    pdf.setTextColor(0, 51, 102);
                    pdf.text('II. COMPLEXITY REFERENCE CHARTS', 20, 30);
                    pdf.line(20, 35, 190, 35);
                    
                    let chartY = 50;
                    
                    // Summary Table
                    pdf.setFont('times', 'bold');
                    pdf.setFontSize(14);
                    pdf.text('Complexity Summary by Difficulty', 20, chartY);
                    chartY += 12;
                    
                    // Table Header
                    pdf.setFillColor(0, 51, 102);
                    pdf.setTextColor(255, 255, 255);
                    pdf.rect(20, chartY-5, 170, 8, 'F');
                    pdf.setFontSize(10);
                    pdf.text('Difficulty', 25, chartY);
                    pdf.text('Typical Time Complexity', 70, chartY);
                    pdf.text('Typical Space Complexity', 130, chartY);
                    chartY += 10;
                    
                    // Table Rows
                    pdf.setFont('times', 'normal');
                    pdf.setTextColor(0, 0, 0);
                    
                    const rows = [
                        ['Easy', 'O(n), O(log n)', 'O(n), O(1)'],
                        ['Medium', 'O(n log n), O(n²)', 'O(n), O(n²)'],
                        ['Hard', 'O(n²), O(2ⁿ)', 'O(n²), O(n!)']
                    ];
                    
                    rows.forEach(row => {
                        if (chartY > 260) { 
                            pdf.addPage(); 
                            chartY = 30;
                            pdf.setFont('times', 'normal');
                        }
                        pdf.setFillColor(245, 245, 245);
                        pdf.rect(20, chartY-3, 170, 8, 'F');
                        pdf.text(row[0], 25, chartY);
                        pdf.text(row[1], 70, chartY);
                        pdf.text(row[2], 130, chartY);
                        chartY += 10;
                    });
                    
                    // ========== CODE PATTERNS SUMMARY ==========
                    pdf.addPage();
                    pdf.setFont('times', 'bold');
                    pdf.setFontSize(20);
                    pdf.setTextColor(0, 51, 102);
                    pdf.text('III. COMMON CODE PATTERNS', 20, 30);
                    pdf.line(20, 35, 190, 35);
                    
                    let patternY = 50;
                    pdf.setFont('times', 'normal');
                    pdf.setFontSize(11);
                    
                    const patterns = [
                        '• Iterative Approaches: Loop-based solutions for linear problems',
                        '• Recursive Patterns: Divide-and-conquer strategies',
                        '• Dynamic Programming: Optimal substructure and overlapping subproblems',
                        '• Two-Pointer Technique: Efficient array/string traversal',
                        '• Sliding Window: Subarray/substring optimization',
                        '• Backtracking: Systematic trial-and-error for constraint problems',
                        '• Greedy Algorithms: Local optimum choices for global solutions'
                    ];
                    
                    patterns.forEach(p => {
                        if (patternY > 260) { 
                            pdf.addPage(); 
                            patternY = 30;
                            pdf.setFont('times', 'normal');
                        }
                        pdf.text(p, 20, patternY);
                        patternY += 8;
                    });
                    
                    // ========== APPENDIX ==========
                    pdf.addPage();
                    pdf.setFont('times', 'bold');
                    pdf.setFontSize(20);
                    pdf.setTextColor(0, 51, 102);
                    pdf.text('IV. APPENDIX: METHODOLOGY', 20, 30);
                    pdf.line(20, 35, 190, 35);
                    
                    pdf.setFont('times', 'normal');
                    pdf.setFontSize(10);
                    let appY = 50;
                    
                    const methodology = [
                        'Data Collection:',
                        'This reviewer was compiled using automated extraction techniques',
                        `from ${filteredTopics.length} web development articles. Each article underwent`,
                        'systematic analysis to extract core concepts, complexity metrics,',
                        'and practical code examples suitable for academic review.',
                        '',
                        'Organization:',
                        'Articles are arranged by increasing difficulty to facilitate',
                        'progressive learning. Each article includes learning objectives,',
                        'detailed concepts, complexity analysis, and implementation examples.',
                        '',
                        'Validation:',
                        'All content has been verified for technical accuracy and relevance',
                        'to standard web development curricula.',
                        '',
                        `Generated on: ${new Date().toLocaleDateString()}`,
                        `Reviewer Version: 1.0`,
                        `Total Pages: ${pdf.internal.getNumberOfPages()}`
                    ];
                    
                    methodology.forEach(line => {
                        if (appY > 260) { 
                            pdf.addPage(); 
                            appY = 30;
                            pdf.setFont('times', 'bold');
                            pdf.setFontSize(16);
                            pdf.setTextColor(0, 51, 102);
                            pdf.text('APPENDIX (continued)', 105, 25, { align: 'center' });
                            pdf.setFont('times', 'normal');
                            pdf.setFontSize(10);
                        }
                        
                        if (line === '') {
                            appY += 6;
                        } else {
                            pdf.text(line, 20, appY);
                            appY += 6;
                        }
                    });
                    
                    // Save
                    const dateStr = new Date().toISOString().slice(0,10);
                    const fileName = `Web_Dev_Reviewer_${dateStr}.pdf`;
                    pdf.save(fileName);
                    
                    setStatus('success', '✅ professional reviewer generated successfully!');
                    
                } catch (error) {
                    setStatus('error', `❌ pdf generation failed: ${error.message}`);
                }
            }

            // Event Listeners
            elements.scrapeBtn.addEventListener('click', startScraping);
            elements.searchFilter.addEventListener('input', filterTopics);
            elements.difficultyFilter.addEventListener('change', filterTopics);
            elements.saveJsonBtn.addEventListener('click', saveToLocalStorage);
            elements.loadJsonBtn.addEventListener('click', loadFromLocalStorage);
            elements.exportJsonBtn.addEventListener('click', exportToJsonFile);
            elements.generatePdfBtn.addEventListener('click', generateAcademicPDF);
            
            elements.cardViewTab.addEventListener('click', () => {
                activeTab = 'card';
                elements.cardViewTab.classList.add('active');
                elements.previewTab.classList.remove('active');
                renderCardView();
            });
            
            elements.previewTab.addEventListener('click', () => {
                activeTab = 'preview';
                elements.previewTab.classList.add('active');
                elements.cardViewTab.classList.remove('active');
                renderDataPreview();
            });

            // Online/Offline Listeners
            window.addEventListener('offline', () => {
                setStatus('warning', '⚠️ OFFLINE MODE: Only saved data available. Scraping disabled.', 0);
                elements.scrapeBtn.disabled = true;
                elements.scrapeBtn.title = 'Scraping requires internet connection';
            });

            window.addEventListener('online', () => {
                setStatus('success', '✅ ONLINE: You can scrape new articles now.', 3000);
                if (!isScraping) {
                    elements.scrapeBtn.disabled = false;
                    elements.scrapeBtn.title = '';
                }
            });

            // Check initial online status
            if (!isOnline()) {
                setStatus('warning', '⚠️ You are offline. Click "load" to view saved data.', 0);
                elements.scrapeBtn.disabled = true;
                elements.scrapeBtn.title = 'Scraping requires internet connection';
            }

            setStatus('info', '⚡ ready to scrape. Click "run scraper" to begin.', 4000);
        })();
    </script>
</body>
</html>
